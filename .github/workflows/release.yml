name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Gradle Wrapper
        run: ./gradlew build
      - name: Create Draft
        run: gh release create --draft --generate-notes ${{ inputs.version }} build/libs

